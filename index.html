<!DOCTYPE html>
<html>
<head>
    <title>Form App</title>
</head>
<body>

    <h2>Simple Form</h2>

    <input name="name" placeholder="Enter name" />
    <input name="email" placeholder="Enter email" />
    <button onclick="submitForm()">Submit</button>

    <p id="result"></p>

    <script>
        function submitForm() {
            document.getElementById("result").innerText = "Success";
        }
    </script>

</body>
</html>
